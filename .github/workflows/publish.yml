name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet build src/Redisboard.NET --configuration Release
      - run: dotnet test src/Redisboard.NET.Tests --configuration Release --no-restore
      - run: dotnet pack src/Redisboard.NET --configuration Release --no-restore
      - run: >
          dotnet nuget push src/Redisboard.NET/bin/Release/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
